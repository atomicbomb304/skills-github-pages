<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Collection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      text-align: center;
      padding: 20px;
      background-color: #f0f0f0;
    }
    h1 {
      font-size: 1.8em;
    }
    #choices {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
    }
    .choice-img {
      width: 80px;
      margin: 10px;
      cursor: pointer;
      border-radius: 10px;
      transition: transform 0.2s ease;
    }
    .choice-img:hover {
      transform: scale(1.1);
    }
    .locked {
      opacity: 0.5;
      pointer-events: none;
    }
    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
    }
    #result, #earnings, #stats {
      margin-top: 20px;
      font-size: 1.1em;
    }
    #adminPanel {
      display: none;
      margin-top: 30px;
      background: #222;
      color: #0f0;
      padding: 15px;
      border-radius: 10px;
    }
    
    /* Tic Tac Toe Styles */
    #game-toggle {
      margin-bottom: 20px;
    }
    #tic-tac-toe {
      display: none;
      margin-top: 20px;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 5px;
      margin: 0 auto;
      width: 310px;
    }
    .cell {
      width: 100px;
      height: 100px;
      background-color: white;
      border: 2px solid #333;
      font-size: 3em;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      border-radius: 5px;
    }
    .cell:hover {
      background-color: #e6e6e6;
    }
    #ttt-result {
      margin-top: 20px;
      font-size: 1.2em;
      font-weight: bold;
      min-height: 30px;
    }
    #ttt-restart {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
    }
    
    @media (max-width: 600px) {
      .choice-img {
        width: 60px;
        margin: 8px;
      }
      h1 {
        font-size: 1.5em;
      }
      .board {
        grid-template-columns: repeat(3, 80px);
        grid-template-rows: repeat(3, 80px);
        width: 250px;
      }
      .cell {
        width: 80px;
        height: 80px;
        font-size: 2.5em;
      }
    }
  </style>
</head>
<body>

  <div id="game-toggle">
    <button onclick="showGame('rpsls')">Rock Paper Scissors Lizard Spock</button>
    <button onclick="showGame('tictactoe')">Tic Tac Toe</button>
  </div>

  <!-- RPSLS Game -->
  <div id="rpsls-game">
    <h1>Rock Paper Scissors Lizard Spock</h1>
    <p>Tap a move to play:</p>

    <div id="choices">
      <img src="https://t3.ftcdn.net/jpg/01/23/14/80/240_F_123148069_wkgBuIsIROXbyLVWq7YNhJWPcxlamPeZ.jpg" class="choice-img" onclick="play('rock')" alt="Rock">
      <img src="https://t4.ftcdn.net/jpg/02/85/63/05/240_F_285630545_PxPNoNP7AlKggydL5gYPCG8kX6zlcOas.jpg" class="choice-img" onclick="play('paper')" alt="Paper">
      <img src="https://t3.ftcdn.net/jpg/01/31/64/02/240_F_131640246_HA5SAWHsuvigtxc47WkNIJXXS5YJIBUP.jpg" class="choice-img" onclick="play('scissors')" alt="Scissors">
      <img src="https://t3.ftcdn.net/jpg/10/44/78/36/240_F_1044783654_0A2XfzdZR1TLb0N2s8z4c7SsTPXmm6dq.jpg" class="choice-img locked" id="spock" onclick="play('spock')" alt="Spock">
      <img src="https://t3.ftcdn.net/jpg/03/13/08/12/240_F_313081293_HNOi3bmoaatbszhw6bv0eUgggKKhZhzh.jpg" class="choice-img locked" id="lizard" onclick="play('lizard')" alt="Lizard">
    </div>

    <button onclick="unlockPremium()">Unlock Premium Moves (Spock & Lizard)</button>

    <div id="result"></div>
    <div id="stats">
      🏆 Wins: <span id="wins">0</span> | ❌ Losses: <span id="losses">0</span> | 🔁 Ties: <span id="ties">0</span>  
      <br>
      🔥 Current Win Streak: <span id="currentStreak">0</span> | 💯 High Score: <span id="highScore">0</span>
    </div>
    <div id="earnings"></div>
  </div>

  <!-- Tic Tac Toe Game -->
  <div id="tic-tac-toe">
    <h1>Tic Tac Toe</h1>
    <div class="board" id="board">
      <div class="cell" onclick="makeMove(0)"></div>
      <div class="cell" onclick="makeMove(1)"></div>
      <div class="cell" onclick="makeMove(2)"></div>
      <div class="cell" onclick="makeMove(3)"></div>
      <div class="cell" onclick="makeMove(4)"></div>
      <div class="cell" onclick="makeMove(5)"></div>
      <div class="cell" onclick="makeMove(6)"></div>
      <div class="cell" onclick="makeMove(7)"></div>
      <div class="cell" onclick="makeMove(8)"></div>
    </div>
    <div id="ttt-result"></div>
    <button id="ttt-restart" onclick="resetGame()">Restart Game</button>
  </div>

  <div id="adminPanel">
    <h2>👑 Admin Panel</h2>
    <p>Total Plays: <span id="totalPlays">0</span></p>
    <p>Total Earnings: $<span id="totalEarnings">0.00</span></p>
  </div>

  <!-- Sound Effects -->
  <audio id="sound-rock" src="https://actions.google.com/sounds/v44/impacts/rock_breaking.ogg"></audio>
  <audio id="sound-paper" src="https://actions.google.com/sounds/v41/cartoon/woodpecker.ogg"></audio>
  <audio id="sound-scissors" src="https://actions.google.com/sounds/v39/foley/scissors_cutting.ogg"></audio>
  <audio id="sound-lizard" src="https://actions.google.com/sounds/v41/animals/lizard.ogg"></audio>
  <audio id="sound-spock" src="https://actions.google.com/sounds/v43/cartoon/cartoon_cowbell.ogg"></audio>

  <script>
    // Game toggle functionality
    function showGame(game) {
      if (game === 'rpsls') {
        document.getElementById('rpsls-game').style.display = 'block';
        document.getElementById('tic-tac-toe').style.display = 'none';
      } else {
        document.getElementById('rpsls-game').style.display = 'none';
        document.getElementById('tic-tac-toe').style.display = 'block';
      }
    }

    // Initialize with RPSLS game showing
    showGame('rpsls');

    // RPSLS Game Code
    const choices = ['rock', 'paper', 'scissors', 'lizard', 'spock'];
    let premiumUnlocked = false;
    let totalPlays = 0;
    let earnings = 0;
    let wins = 0;
    let losses = 0;
    let ties = 0;
    let currentStreak = 0;
    let highScore = 0;

    const outcomes = {
      rock: {scissors: "crushes", lizard: "crushes"},
      paper: {rock: "covers", spock: "disproves"},
      scissors: {paper: "cuts", lizard: "decapitates"},
      lizard: {spock: "poisons", paper: "eats"},
      spock: {scissors: "smashes", rock: "vaporizes"}
    };

    function play(userChoice) {
      if (!premiumUnlocked && (userChoice === 'spock' || userChoice === 'lizard')) {
        alert("This move is locked. Unlock premium to use it.");
        return;
      }

      playSound(userChoice);

      const availableChoices = premiumUnlocked ? choices : choices.slice(0, 3);
      const computerChoice = availableChoices[Math.floor(Math.random() * availableChoices.length)];

      let resultText = `You chose ${userChoice}. Computer chose ${computerChoice}. `;

      if (userChoice === computerChoice) {
        resultText += "It's a tie!";
        ties++;
        currentStreak = 0;
      } else if (outcomes[userChoice] && outcomes[userChoice][computerChoice]) {
        resultText += `You win! ${userChoice} ${outcomes[userChoice][computerChoice]} ${computerChoice}.`;
        wins++;
        currentStreak++;
        if (currentStreak > highScore) highScore = currentStreak;
      } else {
        resultText += `You lose! ${computerChoice} ${outcomes[computerChoice][userChoice]} ${userChoice}.`;
        losses++;
        currentStreak = 0;
      }

      totalPlays++;
      earnings += 0.01;

      document.getElementById("result").innerText = resultText;
      updateStats();
    }

    function unlockPremium() {
      const confirmUnlock = confirm("Unlock Spock and Lizard for $2.99?");
      if (confirmUnlock) {
        premiumUnlocked = true;
        document.getElementById("spock").classList.remove("locked");
        document.getElementById("lizard").classList.remove("locked");
        alert("Premium unlocked!");
      }
    }

    function updateStats() {
      document.getElementById("wins").innerText = wins;
      document.getElementById("losses").innerText = losses;
      document.getElementById("ties").innerText = ties;
      document.getElementById("currentStreak").innerText = currentStreak;
      document.getElementById("highScore").innerText = highScore;
      document.getElementById("earnings").innerText = `Games played: ${totalPlays}`;
      document.getElementById("totalPlays").innerText = totalPlays;
      document.getElementById("totalEarnings").innerText = earnings.toFixed(2);
    }

    function playSound(move) {
      const audio = document.getElementById(`sound-${move}`);
      if (audio) {
        audio.currentTime = 0;
        audio.play();
      }
    }

    // Tic Tac Toe Game Code
    let board = ['', '', '', '', '', '', '', '', ''];
    let currentPlayer = 'X';
    let gameActive = true;

    const winningConditions = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
      [0, 3, 6], [1, 4, 7], [2, 5, 8], // columns
      [0, 4, 8], [2, 4, 6]             // diagonals
    ];

    function makeMove(index) {
      if (!gameActive || board[index] !== '') return;

      board[index] = currentPlayer;
      document.getElementsByClassName('cell')[index].textContent = currentPlayer;
      
      if (checkWin()) {
        document.getElementById('ttt-result').textContent = `Player ${currentPlayer} wins!`;
        gameActive = false;
        return;
      }
      
      if (checkDraw()) {
        document.getElementById('ttt-result').textContent = "Game ended in a draw!";
        gameActive = false;
        return;
      }
      
      currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
      
      // If it's computer's turn (O), make a move
      if (currentPlayer === 'O' && gameActive) {
        setTimeout(computerMove, 500);
      }
    }

    function computerMove() {
      if (!gameActive) return;
      
      // Simple AI: first try to win, then block, then random move
      let move = findWinningMove('O') || findWinningMove('X') || findRandomMove();
      
      if (move !== null) {
        makeMove(move);
      }
    }

    function findWinningMove(player) {
      for (let i = 0; i < winningConditions.length; i++) {
        const [a, b, c] = winningConditions[i];
        if (board[a] === player && board[b] === player && board[c] === '') return c;
        if (board[a] === player && board[c] === player && board[b] === '') return b;
        if (board[b] === player && board[c] === player && board[a] === '') return a;
      }
      return null;
    }

    function findRandomMove() {
      const availableMoves = [];
      for (let i = 0; i < board.length; i++) {
        if (board[i] === '') availableMoves.push(i);
      }
      if (availableMoves.length > 0) {
        return availableMoves[Math.floor(Math.random() * availableMoves.length)];
      }
      return null;
    }

    function checkWin() {
      for (let i = 0; i < winningConditions.length; i++) {
        const [a, b, c] = winningConditions[i];
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return true;
        }
      }
      return false;
    }

    function checkDraw() {
      return !board.includes('');
    }

    function resetGame() {
      board = ['', '', '', '', '', '', '', '', ''];
      gameActive = true;
      currentPlayer = 'X';
      document.getElementById('ttt-result').textContent = '';
      
      const cells = document.getElementsByClassName('cell');
      for (let i = 0; i < cells.length; i++) {
        cells[i].textContent = '';
      }
    }

    // Initialize Tic Tac Toe game
    resetGame();

    // Secret Admin Panel Access
    document.addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'a') {
        const pass = prompt("Enter developer code:");
        if (pass === "devaccess2024") {
          document.getElementById("adminPanel").style.display = "block";
        } else {
          alert("Access Denied.");
        }
      }
    });
  </script>
</body>
</html>
